<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">DevotionalAI Icon</title>
  <desc id="desc">Modern church and Bible themed icon with an open scripture base and radiant cross.</desc>
  <defs>
    <linearGradient id="crossGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe7a8"/>
      <stop offset="45%" stop-color="#f6c65e"/>
      <stop offset="100%" stop-color="#d89629"/>
    </linearGradient>
    <filter id="crossGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(256 256)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#crossGlow)">
      <path d="M 0 -174 V 176 M -72 -82 H 72" stroke="#ffd57a" stroke-opacity="0.35" stroke-width="42"/>
      <path d="M 0 -174 V 176 M -72 -82 H 72" stroke="#5d3e11" stroke-width="28"/>
      <path d="M 0 -174 V 176 M -72 -82 H 72" stroke="url(#crossGold)" stroke-width="18"/>
      <path d="M 0 -174 V 176 M -72 -82 H 72" stroke="#fff1c6" stroke-opacity="0.7" stroke-width="4"/>
    </g>

    <g transform="translate(-28 -82)" stroke="#fff8de" stroke-linecap="round">
      <line x1="-10" y1="0" x2="10" y2="0" stroke-width="2.5"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="4.5" fill="#fff9e8" stroke="none"/>
    </g>
  </g>
</svg>
