<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">DevotionalAI Logo</title>
  <desc id="desc">DevotionalAI logo with unique church and scripture icon plus modern wordmark.</desc>
  <defs>
    <linearGradient id="wordLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="65%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="wordAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffe7a8"/>
      <stop offset="45%" stop-color="#f6c65e"/>
      <stop offset="100%" stop-color="#d89629"/>
    </linearGradient>
    <filter id="wordShadow" x="-25%" y="-30%" width="150%" height="170%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g transform="translate(40 20)">
    <svg x="0" y="0" width="280" height="280" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="crossGoldLocal" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffe7a8"/>
          <stop offset="45%" stop-color="#f6c65e"/>
          <stop offset="100%" stop-color="#d89629"/>
        </linearGradient>
      </defs>
      <g transform="translate(256 256)">
        <g fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 0 -174 V 176 M -72 -82 H 72" stroke="#ffd57a" stroke-opacity="0.35" stroke-width="42"/>
          <path d="M 0 -174 V 176 M -72 -82 H 72" stroke="#5d3e11" stroke-width="28"/>
          <path d="M 0 -174 V 176 M -72 -82 H 72" stroke="url(#crossGoldLocal)" stroke-width="18"/>
          <path d="M 0 -174 V 176 M -72 -82 H 72" stroke="#fff1c6" stroke-opacity="0.7" stroke-width="4"/>
        </g>
        <g transform="translate(230 174)" stroke="#fff3d6" stroke-linecap="round">
          <line x1="-10" y1="0" x2="10" y2="0" stroke-width="2.5"/>
          <line x1="0" y1="-10" x2="0" y2="10" stroke-width="2.5"/>
          <circle cx="0" cy="0" r="4" fill="#fff9e8" stroke="none"/>
        </g>
      </g>
    </svg>

    <g transform="translate(320 165)" filter="url(#wordShadow)">
      <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="108" font-weight="700" letter-spacing="-2">
        <tspan fill="url(#wordLight)">Devotional</tspan><tspan fill="url(#wordAccent)">AI</tspan>
      </text>
      <text x="4" y="42" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="5" fill="#93c5fd">
        SCRIPTURE COMPANION
      </text>
    </g>
  </g>
</svg>
